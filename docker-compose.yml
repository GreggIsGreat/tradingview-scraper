version: "3.9"

services:
  scraper:
    build: .
    container_name: tv-scraper
    ports:
      - "8877:8877"
    volumes:
      - ./data:/app/data          # persist the SQLite DB
    env_file:
      - .env
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"